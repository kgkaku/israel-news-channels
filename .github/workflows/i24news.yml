name: refresh i24NEWS

on:
  schedule:
    - cron: '0 */9 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests
        sudo apt-get update
        sudo apt-get install -y unzip
    
    - name: Extract hidden password-protected zip
      env:
        I24NEWS_PASSWORD: ${{ secrets.I24NEWS_PASSWORD }}
      run: |
        # List files to verify zip is there (hidden)
        ls -la
        
        # Extract with password
        unzip -P "$I24NEWS_PASSWORD" i24news.zip
        
        # Verify extraction
        ls -la main.py || echo "Extraction failed"
    
    - name: Run generator
      run: python main.py
    
    - name: Commit and push only output files
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # Only add the output files in i24news folder
        git add i24news/output.m3u i24news/output.json
        
        # Commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "Update i24NEWS [$(date +'%Y-%m-%d %H:%M UTC')]"
        
        # Push changes (zip remains hidden)
        git push
    
    - name: Clean up extracted script
      run: rm -f main.py
